{% extends "base.html" %}

{% block title %}FemCycle Companion | Forgot Password{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Forgot password</h1>
    <p>Enter your email and an OTP will be prepared for password reset.</p>
    <form action="/forgot-password" method="post" class="stack-form">
        <label>Email
            <input type="email" name="email" required>
        </label>
        <button class="primary-button" type="submit">Send OTP</button>
    </form>
    <p class="soft-text auth-links">
        <a href="/reset-password">I already have an OTP</a>
    </p>
</section>
{% endblock %}
