{% extends "base.html" %}

{% block title %}FemCycle Companion | Reset Password{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Reset password</h1>
    <p>Use the OTP from your email to set a new password.</p>
    <form action="/reset-password" method="post" class="stack-form">
        <label>Email
            <input type="email" name="email" value="{{ reset_email }}" required>
        </label>
        <label>OTP code
            <input type="text" name="otp_code" maxlength="6" required>
        </label>
        <label>New password
            <input type="password" name="new_password" minlength="6" required>
        </label>
        <button class="primary-button" type="submit">Update password</button>
    </form>
    <p class="soft-text auth-links">
        <a href="/forgot-password">Request a new OTP</a>
    </p>
</section>
{% endblock %}
